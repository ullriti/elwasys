name: Maven Package

on:
  release:
    types: [created]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      # Client-Raspi compiles at language level 21 since Phase 1
      # (maven.compiler.release=21 in the parent POM) — the release JDK here
      # must be >= 21, otherwise "mvn install -pl Client-Raspi -am"
      # fails with "invalid target release: 21".
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'liberica'
        server-id: github
        settings-path: ${{ github.workspace }}

    - name: Apply version number
      # Sets the version in the root (parent) POM and propagates it to all
      # modules that inherit it (Client-Raspi, backend), including the
      # <parent><version> and ${project.version} references — no more sed
      # hack across multiple POM files.
      run: mvn -B versions:set -DnewVersion=${{ github.event.release.tag_name }} -DgenerateBackupPoms=false

    - name: Apply version number to Utilities.APP_VERSION
      # APP_VERSION is a plain compile-time constant (not read from the POM),
      # so it still needs this simple substitution.
      run: sed -i -E "s/0.0.0-local-development/${{ github.event.release.tag_name }}/g" Client-Raspi/src/main/org/kabieror/elwasys/common/Utilities.java

    - name: Build Raspi-Client (Terminal-fat-jar)
      # Reactor build from the root so the (now re-versioned) parent POM is
      # also installed into the local repo — a per-module "mvn install" inside
      # Client-Raspi/ alone would not install the parent POM it inherits from.
      #
      # -DskipTests: der Release-Job PAKETIERT nur den Terminal-fat-jar; die
      # Testsuiten sind Sache der CI (siehe ci.yml, läuft bei jedem PR/Push auf
      # master). Client-Raspis TestFX-/E2E-Tests brauchen Xvfb + PostgreSQL + ein
      # laufendes Backend (siehe run-ui-tests.sh) - dieses Infrastruktur-Setup gibt
      # es im Release-Runner bewusst nicht, daher hier keine Testausführung.
      run: mvn -B install -pl Client-Raspi -am -DskipTests

    - name: Publish runnable JAR
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ github.token }}
        file: Client-Raspi/target/raspi-client-${{ github.event.release.tag_name }}-jar-with-dependencies.jar
        asset_name: raspi-client-${{ github.event.release.tag_name }}.jar
        tag: ${{ github.event.release.tag_name }}
        overwrite: true

    - name: Generate SHA-256 checksum for the release jar
      # Issue #62 (Jar-Integrität): eine .sha256-Prüfsumme neben das Jar legen, damit
      # update.sh/setup.sh den Download vor dem Deploy verifizieren können (sha256sum -c).
      # Die Prüfsummen-Zeile trägt bewusst den ASSET-Namen (raspi-client-<tag>.jar), NICHT den
      # Build-Namen (...-jar-with-dependencies.jar): auf dem Terminal heißt die Datei so, wie
      # sie als Release-Asset heruntergeladen wird, sonst schlüge "sha256sum -c" am Namen fehl.
      run: |
        set -euo pipefail
        jar="Client-Raspi/target/raspi-client-${{ github.event.release.tag_name }}-jar-with-dependencies.jar"
        asset="raspi-client-${{ github.event.release.tag_name }}.jar"
        hash="$(sha256sum "$jar" | awk '{print $1}')"
        # Standard-coreutils-Format "<hash>  <dateiname>" (zwei Leerzeichen) - so greift
        # "sha256sum -c" auf dem Terminal gegen die gleichnamig heruntergeladene Datei.
        printf '%s  %s\n' "$hash" "$asset" > "${asset}.sha256"
        echo "Erzeugte Prüfsumme:"
        cat "${asset}.sha256"

    - name: Publish SHA-256 checksum
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ github.token }}
        file: raspi-client-${{ github.event.release.tag_name }}.jar.sha256
        asset_name: raspi-client-${{ github.event.release.tag_name }}.jar.sha256
        tag: ${{ github.event.release.tag_name }}
        overwrite: true

    # Backend-Container-Image (Phase 2 AP6, siehe docs/kb/05-migration-plan.md und
    # backend/Dockerfile). Nutzt denselben, bereits per "versions:set" oben auf die
    # Release-Tag-Version gehobenen Arbeitsbaum als Docker-Build-Kontext, damit Jar-Version
    # und Image-Tag übereinstimmen. Veröffentlichung nach GHCR mit dem eingebauten
    # GITHUB_TOKEN (kein zusätzliches Secret nötig, siehe "packages: write" oben) - andere
    # Registries (z.B. Docker Hub) würden ein separates, hier absichtlich nicht angelegtes
    # Secret brauchen, siehe docs/kb/05-migration-plan.md ("offene Punkte").
    - name: Compute lowercase image name
      # GHCR verlangt einen durchgängig kleingeschriebenen Image-Pfad; github.repository
      # übernimmt aber die tatsächliche Groß-/Kleinschreibung des Repository-Namens.
      run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository_owner }}/elwasys-backend' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Build & push backend image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: backend/Dockerfile
        push: true
        tags: |
          ${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}
          ${{ env.IMAGE_NAME }}:latest
