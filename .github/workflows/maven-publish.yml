name: Maven Package

on:
  release:
    types: [created]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 21
      # Common/Client-Raspi compile at language level 21 since Phase 1
      # (maven.compiler.release=21 in the parent POM) — the release JDK here
      # must be >= 21, otherwise "mvn install -pl Common,Client-Raspi -am"
      # fails with "invalid target release: 21".
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'liberica'
        server-id: github
        settings-path: ${{ github.workspace }}

    - name: Apply version number
      # Sets the version in the root (parent) POM and propagates it to all
      # modules that inherit it (Common, Client-Raspi, Portal), including the
      # <parent><version> and ${project.version} references — no more sed
      # hack across multiple POM files.
      run: mvn -B versions:set -DnewVersion=${{ github.event.release.tag_name }} -DgenerateBackupPoms=false

    - name: Apply version number to Utilities.APP_VERSION
      # APP_VERSION is a plain compile-time constant (not read from the POM),
      # so it still needs this simple substitution.
      run: sed -i -E "s/0.0.0-local-development/${{ github.event.release.tag_name }}/g" Common/src/main/java/org/kabieror/elwasys/common/Utilities.java

    - name: Build Common + Raspi-Client
      # Reactor build from the root so the (now re-versioned) parent POM is
      # also installed into the local repo — a plain "mvn install" inside
      # Common/ alone would not install it, and Client-Raspi needs it there
      # to resolve the common dependency.
      run: mvn -B install -pl Common,Client-Raspi -am

    - name: Publish runnable JAR
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ github.token }}
        file: Client-Raspi/target/raspi-client-${{ github.event.release.tag_name }}-jar-with-dependencies.jar
        asset_name: raspi-client-${{ github.event.release.tag_name }}.jar
        tag: ${{ github.event.release.tag_name }}
        overwrite: true

    # Backend-Container-Image (Phase 2 AP6, siehe kb/05-migration-plan.md und
    # backend/Dockerfile). Nutzt denselben, bereits per "versions:set" oben auf die
    # Release-Tag-Version gehobenen Arbeitsbaum als Docker-Build-Kontext, damit Jar-Version
    # und Image-Tag übereinstimmen. Veröffentlichung nach GHCR mit dem eingebauten
    # GITHUB_TOKEN (kein zusätzliches Secret nötig, siehe "packages: write" oben) - andere
    # Registries (z.B. Docker Hub) würden ein separates, hier absichtlich nicht angelegtes
    # Secret brauchen, siehe kb/05-migration-plan.md ("offene Punkte").
    - name: Compute lowercase image name
      # GHCR verlangt einen durchgängig kleingeschriebenen Image-Pfad; github.repository
      # übernimmt aber die tatsächliche Groß-/Kleinschreibung des Repository-Namens.
      run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository_owner }}/elwasys-backend' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Build & push backend image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: backend/Dockerfile
        push: true
        tags: |
          ${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}
          ${{ env.IMAGE_NAME }}:latest
