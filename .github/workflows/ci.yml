name: CI

# Run the test suites on every pull request (and on pushes to master, so the
# default branch stays green). Jobs mirror the documented local runner scripts (see
# kb/06-ui-tests.md, kb/05-migration-plan.md "Phase 3 AP6"): common/client/backend build+test
# their module, portal-legacy-build keeps the still-in-repo Alt-Portal module compiling
# (Playwright E2E against it is STILLGELEGT - superseded by backend-e2e, see that job's
# comment), backend-e2e is the new Playwright suite (P1-P20) against the Vaadin-Flow Portal.
# The Cross-Component maintenance-channel suite (P21/P22) needs neither Portal module - it
# runs as part of "client" (plain `mvn test` there picks up
# ClientMaintenanceConnectionE2ETest, which only depends on Common's MaintenanceServer).
on:
  pull_request:
  push:
    branches: [master]

# Cancel superseded runs on the same ref (e.g. new push to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Common library – build + unit tests. It has no external dependencies and is
  # the base every other module resolves, so this is the fast fail-first signal.
  # ---------------------------------------------------------------------------
  common:
    name: Common (build & tests)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # JDK 21, not 17: since Phase 1, Common/Client-Raspi compile at language
      # level 21 (maven.compiler.release=21 in the parent POM). Every job below
      # builds Common first, so all of them need a >= 21 JDK, even
      # portal-legacy-build (Portal itself still compiles at 1.8, but the
      # runner JDK must satisfy Common's release level to build it at all).
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          cache: maven

      - name: Build & test Common
        # Build via the root reactor (-pl Common -am) so the aggregator
        # parent POM is installed into the local repo too — a plain
        # "mvn -f Common/pom.xml install" would not install it, and the
        # Client-Raspi/Portal jobs need it on the runner to resolve Common.
        run: mvn -B -f pom.xml install -pl Common -am

  # ---------------------------------------------------------------------------
  # Raspi-Client – JavaFX TestFX characterization tests + a headless end-to-end
  # test that boots the whole app against a seeded PostgreSQL and the in-project
  # fhem simulator. Runs under Xvfb (see kb/06-ui-tests.md).
  # ---------------------------------------------------------------------------
  client:
    name: Client-Raspi (headless UI + E2E)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          cache: maven

      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Start & seed PostgreSQL
        run: |
          set -euo pipefail
          sudo pg_ctlcluster 16 main start 2>/dev/null || true
          for i in $(seq 1 30); do pg_isready -q && break; sleep 1; done
          pg_isready || { echo "PostgreSQL not ready"; exit 1; }
          if ! sudo -u postgres psql -lqt | cut -d'|' -f1 | grep -qw elwasys; then
            echo "Seeding elwasys database"
            # Pipe via stdin so the file is read as the runner user; the
            # postgres OS user cannot read the checkout under /home/runner.
            sudo -u postgres psql -q < Common/resources/database-init.sql
          fi

      - name: Run Client tests (headless via Xvfb)
        run: bash Client-Raspi/run-ui-tests.sh

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-surefire-reports
          path: Client-Raspi/target/surefire-reports/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Alt-Portal (Vaadin 7 WAR) – STILLGELEGT als Playwright-E2E-Ziel (Phase 3 AP6, siehe
  # kb/05-migration-plan.md / kb/06-ui-tests.md): die alte Suite (Portal/e2e, P1-P20) ist durch
  # backend/e2e (siehe unten) abgelöst und läuft hier nicht mehr. Das Alt-Portal-MODUL bleibt
  # laut Roadmap bis Phase 5 im Repo und wird deshalb weiterhin gebaut - nicht weil die
  # Cross-Component-Suite (P21/P22, "client"-Job oben) es bräuchte (sie hängt nur an Common's
  # MaintenanceServer, siehe Client-Raspi/run-cross-component-e2e.sh - kein Portal-Bezug),
  # sondern damit eine Portal-Regression trotzdem auffällt, solange der Code noch da ist.
  # ---------------------------------------------------------------------------
  portal-legacy-build:
    name: Alt-Portal (Build, stillgelegt als E2E-Ziel)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          cache: maven

      - name: Build Alt-Portal
        # Via den Root-Reactor (-pl Portal -am), damit die Parent-POM + Common mit aufgelöst
        # werden (siehe Kommentar im "common"-Job oben) - Tests laufen bewusst nicht mit (die
        # fachliche Prüfung läuft jetzt über backend/e2e, siehe unten).
        run: mvn -B -f pom.xml package -pl Portal -am -DskipTests

  # ---------------------------------------------------------------------------
  # Backend Portal (Vaadin Flow) – Playwright E2E (Phase 3 AP6 Abnahmekriterium, siehe
  # kb/05-migration-plan.md / kb/06-ui-tests.md). backend/e2e/scripts/start-backend.sh boots
  # PostgreSQL, creates a fresh dedicated E2E database, builds the backend jar in production
  # mode (mvn package -Pproduction - the only build mode verified to run without a Vaadin
  # dev-mode license check, see kb/05-migration-plan.md "Phase 3 AP2") and runs it; the P1-P20
  # test plan (kb/08-test-plan.md) is exercised against it in Chromium. Fachlicher Nachfolger
  # des ehemaligen "portal"-Jobs oben.
  # ---------------------------------------------------------------------------
  backend-e2e:
    name: Backend Portal (Playwright E2E)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/e2e/package-lock.json

      - name: Install E2E dependencies
        working-directory: backend/e2e
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: backend/e2e
        run: |
          set -euo pipefail
          npx playwright install --with-deps chromium
          # The playwright config points executablePath at PLAYWRIGHT_CHROMIUM_PATH
          # (falling back to the container's /opt/pw-browsers/chromium). On the
          # runner, use the browser Playwright just downloaded.
          CHROMIUM_PATH="$(node -e "console.log(require('@playwright/test').chromium.executablePath())")"
          echo "PLAYWRIGHT_CHROMIUM_PATH=$CHROMIUM_PATH" >> "$GITHUB_ENV"

      - name: Run backend Portal E2E tests
        working-directory: backend/e2e
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-e2e-playwright-report
          path: backend/e2e/playwright-report/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Backend – new Spring Boot module (Phase 2, parallel to the legacy stack, see
  # kb/05-migration-plan.md).
  #
  # Since AP2 (JPA entities/services) the module has a test-scope dependency on "common"
  # (Alt-vs-Neu-Äquivalenztests für Preis-/Guthabenberechnung, see kb/05-migration-plan.md) -
  # this job now builds Common first via the root reactor (-pl Common -am), same pattern as
  # the "common"/"client" jobs above, so backend's test classpath can resolve it.
  #
  # Tests use Testcontainers by default (see backend/src/test/.../TestPostgres.java) - unlike
  # the "client"/"backend-e2e" jobs above, which seed/boot a local PostgreSQL cluster because
  # the sandboxed dev container this project is normally developed in (see kb/07-cloud-init.md)
  # has no Docker daemon. GitHub-hosted ubuntu-24.04 runners *do* have a Docker daemon, so
  # here Testcontainers can run unmodified and doesn't need the local-PG workaround
  # backend/run-backend-tests.sh provides for that daemon-less environment.
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (Spring Boot, Testcontainers)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          cache: maven

      - name: Build Common (test-scope dependency of backend)
        run: mvn -B -f pom.xml install -pl Common -am -DskipTests

      - name: Build & test backend
        run: mvn -B -f pom.xml test -pl backend

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports/
          if-no-files-found: ignore

      # Deployment (Phase 2 AP6, siehe kb/05-migration-plan.md, backend/Dockerfile): baut nur
      # das Container-Image, ohne es zu veröffentlichen - beweist, dass das Dockerfile
      # tatsächlich baubar ist (kann in der sandboxed Entwicklungsumgebung dieses Projekts
      # nicht verifiziert werden, siehe kb/07-cloud-init.md: kein Docker-Daemon dort).
      # GitHub-Actions-ubuntu-24.04-Runner bringen Docker+BuildKit bereits mit. Kontext ist die
      # Repo-Wurzel (siehe Kopf-Kommentar von backend/Dockerfile), unabhängig vom
      # obigen Maven-Build dieses Jobs (baut den Jar-Build im eigenen Container noch einmal,
      # ohne Layer-Cache aus den vorigen Schritten - das ist hier gewollt: es validiert
      # denselben Weg, den ein frischer Image-Build in Produktion nähme).
      - name: Build backend container image (build only, no push)
        run: docker build -f backend/Dockerfile -t elwasys-backend:ci .
