# Die Basis-URL des elwasys-Backends, z.B. http://backend-host:8080/
# Seit Phase 4 AP5 ist dies der EINZIGE Datenzugriffspfad des Terminals (REST-API v1 +
# ausgehende WebSocket-Verbindung fuer die Fernwartung, siehe
# ws/TerminalWebSocketClient) - kein Datenbankzugang mehr noetig.
backend.url=
# Der Standort-Token dieses Terminals fuer die Backend-API (erzeugt ueber
# token-cli, siehe docs/kb/04-build-and-run.md)
backend.token=
# Der Standort des Waschwächters (Anzeigename, z.B. in Fehlermeldungen)
#   Wird verwendet, um nur Geräte aus dem Backend anzuzeigen,
#   die am Standort des Waschwächters verfügbar sind (ergibt sich fachlich aus
#   backend.token, dieser Wert ist rein informativ).
# z.B. Waschküche1
location=Default
# Die Zeit in Sekunden, bevor das Display bei Inaktivität abgedunkelt wird.
# Bei negativem Wert wird das Display nicht abgedunkelt.
displayTimeout=20
# Die Zeit, für die der Startbildschirm auf jeden Fall angezeigt wird.
startupDelay=5
# Die Zeit nach der letzten Aktion eines Benutzers in Sekunden, nach der ein angemeldeter Benutzer automatisch
# ausgeloggt werden soll.
sessionTimeout=20
# Address of the Zigbee gateway
deconz.server:
deconz.user:
deconz.password:
# Der FHEM-Server, über welchen der Strom der Geräte geschaltet werden kann.
fhem.server=
# Der Port, auf welchem der FHEM-Server hört.
fhem.port=7072
# Intervall (in Sekunden) des periodischen Offline-Abgleichs: Standort-Snapshot
# aktualisieren und ein evtl. ausstehendes Offline-Ereignis-Journal nachmelden, sobald das
# Backend wieder erreichbar ist (Phase 4 AP6, siehe docs/kb/05-migration-plan.md "Konzeptskizze:
# Offline-Buchungen am Terminal").
offline.pollIntervalSeconds=20