# The base URL of the elwasys backend, e.g. http://backend-host:8080/
backend.url: http://localhost:8080/

# The terminal's location token for the backend API v1 (issued via
# token-cli, see kb/04-build-and-run.md). Replaces the former direct
# database credentials as the terminal's primary data access path.
backend.token: elwt_replace-with-a-real-token

# TRANSITIONAL (Phase 4 AP4, removed in AP5, see kb/05-migration-plan.md):
# direct database access is only used any more for the maintenance
# connection registration (LocationManager) - it will be replaced by the
# outgoing WebSocket connection in AP5. All other data access goes through
# backend.url/backend.token above.
# The address of the postgresql server
# z.B. - databaseserver1:5432
#      - 192.168.0.100:10090,
#      - 10.0.0.5
database.server: localhost:5432

# Name of the database
database.name: elwasys

# Username for the database connection
database.user: elwaclient1

# Password for the database connection
database.password: secret

# Weather the database connection is to be encrypted
database.useSsl: false

# Location of this client (transitional, only used for the maintenance
# registration above - see backend.token for the API access location scope)
#   Only devices at this location will be available.
# e.g. Laundry
location: Laundry

# Time in seconds after which the display is turned off
# If the value is negative, the display will not be turned off.
displayTimeout: 10

# Time in seconds for which the startup procedure is to be delayed
startupDelay: 0

# Time in seconds after which a logged in user is to be logged off.
sessionTimeout: 60

# The URL of the elwasys web portal
portalUrl: https://example.elwasys.de


# Choose whether to use Zigbee via DeConz or fhem as communication gateway.

# Address of the Zigbee gateway
# deconz.server: 127.0.0.1
# deconz.user: delight
# deconz.password: secret

# Address of the fhem server to use
# fhem.server: 127.0.0.1
# Port of the fhem server
# fhem.port: 7072

# Notifications (email/push) are sent centrally by the backend now, see
# elwasys.notifications.enabled in the backend configuration (kb/04-build-and-run.md) -
# this client no longer sends any notifications itself, so smtp.*/pushover.*
# settings no longer exist here.

# Port to listen on for incoming maintenance requests
maintenance.port: 3591
