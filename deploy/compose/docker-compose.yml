# elwasys backend – docker-compose-Stack (Phase 2 AP6, siehe docs/kb/05-migration-plan.md,
# Technologie-Entscheidung "Deployment Backend: Container-Image; Betrieb per docker-compose
# ... oder Kubernetes"). Betriebsanleitung: docs/kb/04-build-and-run.md, Abschnitt "Deployment".
#
# Enthält: Backend-Container (Standard: GHCR-Release-Image gezogen, siehe backend-Service +
# docker-compose.build.yml für einen lokalen Build) + eine mitgelieferte PostgreSQL-16-Instanz
# für Neuinstallationen.
#
# Zwei Betriebsvarianten (Issue #64):
#   1. Neuinstallation (mitgelieferte DB): "docker compose up -d" startet beide Services
#      (backend + postgres) - das Backend-Image wird aus GHCR gezogen (Issue #89).
#   2. Anbindung an eine Bestands-DB: den "postgres"-Service NICHT starten, ELWASYS_DB_URL auf
#      die externe DB zeigen (siehe .env.example). WICHTIG: der Backend-Service hat unten ein
#      "depends_on: postgres", d.h. ein blosses "docker compose up backend" würde den
#      postgres-Service TROTZDEM mitstarten. Für die Bestands-DB-Variante daher zwingend
#      "--no-deps" verwenden:
#        docker compose up -d --no-deps backend
#
# Nutzung (Neuinstallation, GHCR-Release-Image):
#   cd deploy/compose
#   cp .env.example .env   # Platzhalter durch echte Werte ersetzen (siehe .env.example)
#   docker compose up -d   # zieht ELWASYS_BACKEND_IMAGE (Default ghcr.io/ullriti/elwasys-backend:latest)
#   curl http://127.0.0.1:8080/actuator/health/liveness   # Prozess-Health (Root-/health = Alerting, AP6 #32)
#
# Lokaler Build aus dem Arbeitsbaum (statt GHCR-Image, Issue #89): das Build-Overlay zuladen:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
#
# TLS ist Pflicht für den externen Zugriff (Issue #35): dieses Compose-File terminiert selbst
# kein TLS und bindet den Backend-Port deshalb bewusst NUR an 127.0.0.1 (siehe "ports:" beim
# backend-Service unten), erreichbar für einen lokalen Reverse Proxy/Load Balancer, NICHT
# direkt aus dem Netz im Klartext. Für einen eigenständigen TLS-Terminierungspunkt siehe das
# optionale Overlay docker-compose.proxy.yml (Caddy, automatisches Let's-Encrypt-TLS) - es
# erreicht das Backend über das Compose-interne Netz (nicht über den veröffentlichten Port):
#   docker compose -f docker-compose.yml -f docker-compose.proxy.yml up -d
# (Für einen lokalen Backend-Build zusätzlich "-f docker-compose.build.yml --build" anhängen.)

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-elwasys}
      POSTGRES_USER: ${POSTGRES_USER:-elwasys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss in .env gesetzt sein}
      # Zeitzone (Issue #31) - konsistent mit dem Backend (Europe/Berlin), damit Server-Logs
      # und ggf. now()-Defaults in derselben Zone wie die Anwendung stehen.
      TZ: ${TZ:-Europe/Berlin}
      PGTZ: ${TZ:-Europe/Berlin}
    # Log-Rotation (Issue #32): json-file wächst sonst unbegrenzt (Dauerbetrieb). Kappt die
    # Container-Logs auf max. 3x 10 MiB je Service.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      # Benannter Volume statt Bind-Mount: Datenpersistenz unabhängig vom Host-Pfad, siehe
      # "volumes:" unten. Kein gemountetes database-init.sql (siehe .env.example-Kommentar
      # oben) - eine leere Datenbank wird beim ersten Backend-Start per Flyway-Baseline-
      # Migration (V1__baseline_schema_0_4_0.sql) vollständig angelegt.
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-elwasys} -d ${POSTGRES_DB:-elwasys}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    # Standard: das im Release nach GHCR gepushte Image ZIEHEN (Issue #89), NICHT lokal bauen -
    # so ist "was in Produktion läuft" an ein Release-Tag/Digest gebunden statt an den
    # Git-Checkout des Docker-Hosts (Parität zum Helm-Weg, der dieselbe GHCR-Quelle referenziert).
    # ELWASYS_BACKEND_IMAGE in .env möglichst auf ein konkretes Release-Tag oder @sha256:-Digest
    # pinnen statt auf :latest (siehe .env.example, „Release einfrieren"). Für einen bewussten
    # lokalen Build aus dem Arbeitsbaum das Overlay docker-compose.build.yml zusätzlich laden:
    #   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
    image: ${ELWASYS_BACKEND_IMAGE:-ghcr.io/ullriti/elwasys-backend:latest}
    environment:
      # Standard: gegen den mitgelieferten "postgres"-Service oben. Für die Variante
      # "Bestands-DB" hier stattdessen auf die externe DB zeigen (siehe .env.example) und den
      # "postgres"-Service nicht mitstarten - Flyways baselineOnMigrate übernimmt eine bereits
      # über den Alt-Weg (database-init.sql) angelegte Datenbank unverändert (siehe
      # docs/kb/02-data-model.md, docs/kb/04-build-and-run.md).
      ELWASYS_DB_URL: ${ELWASYS_DB_URL:-jdbc:postgresql://postgres:5432/${POSTGRES_DB:-elwasys}}
      ELWASYS_DB_USER: ${ELWASYS_DB_USER:-${POSTGRES_USER:-elwasys}}
      ELWASYS_DB_PASSWORD: ${ELWASYS_DB_PASSWORD:-${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss in .env gesetzt sein}}

      ELWASYS_NOTIFICATIONS_ENABLED: ${ELWASYS_NOTIFICATIONS_ENABLED:-false}
      ELWASYS_SMTP_HOST: ${ELWASYS_SMTP_HOST:-}
      ELWASYS_SMTP_PORT: ${ELWASYS_SMTP_PORT:-465}
      ELWASYS_SMTP_USER: ${ELWASYS_SMTP_USER:-}
      ELWASYS_SMTP_PASSWORD: ${ELWASYS_SMTP_PASSWORD:-}
      ELWASYS_SMTP_SENDER_ADDRESS: ${ELWASYS_SMTP_SENDER_ADDRESS:-}
      ELWASYS_SMTP_AUTH: ${ELWASYS_SMTP_AUTH:-true}
      ELWASYS_SMTP_USE_SSL: ${ELWASYS_SMTP_USE_SSL:-true}
      ELWASYS_PUSHOVER_API_TOKEN: ${ELWASYS_PUSHOVER_API_TOKEN:-}

      ELWASYS_AUTH_REHASH_ON_LOGIN: ${ELWASYS_AUTH_REHASH_ON_LOGIN:-false}

      # Basis-URL des Portals für die Passwort-Reset-Mail (Issue #86/H7). Der Passwort-Reset ist
      # per Default AN (application.yml elwasys.password-reset.enabled) und baut seine Links aus
      # dieser URL. Wird sie NICHT durchgereicht, fällt das Backend still auf den Code-Default
      # http://localhost:8080 zurück - Produktions-Reset-Mails enthielten dann tote localhost-
      # Links. Bewusst ein ":?"-Guard (kein Default) statt eines leeren Werts: ein fehlender Wert
      # bricht "docker compose up" mit klarer Meldung ab, statt still kaputte Links zu erzeugen
      # (ein leerer Wert wäre hier sogar schlechter als der Code-Default - er überschriebe ihn mit
      # Leerstring). Für den Wert siehe .env.example. Analog zum POSTGRES_PASSWORD-Guard oben.
      ELWASYS_PORTAL_BASE_URL: ${ELWASYS_PORTAL_BASE_URL:?ELWASYS_PORTAL_BASE_URL muss in .env gesetzt sein (öffentliche Portal-Basis-URL für Passwort-Reset-Mails, z.B. https://elwasys.example.com) - siehe .env.example}

      # Zeitzone (Issue #31): muss mit der Terminal-Zeitzone übereinstimmen (Europe/Berlin),
      # sonst fällt jede nachgemeldete Terminal-Meldung in den Ersetzungszweig von
      # ClientTimestampPolicy und DYNAMIC-Preis rechnet über die DST-Nacht falsch. Das
      # Image setzt denselben Default bereits (backend/Dockerfile), hier nochmal explizit,
      # damit die Zone auch bei einem abweichenden Basis-Image gesetzt ist.
      TZ: ${TZ:-Europe/Berlin}
    # Nur an 127.0.0.1 binden (Issue #35, TLS-Pflicht): das Backend spricht selbst kein TLS,
    # der Port darf deshalb NICHT im Klartext aus dem Netz erreichbar sein. Ein TLS-Reverse-
    # Proxy (siehe docker-compose.proxy.yml) erreicht das Backend über das Compose-interne Netz
    # (Service-Name "backend"), nicht über diesen veröffentlichten Port. Für den direkten
    # Zugriff aus dem Netz ist zwingend ein vorgelagerter TLS-Terminierungspunkt nötig.
    ports:
      - "127.0.0.1:8080:8080"
    # Log-Rotation (Issue #32): siehe postgres-Service oben.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
    # Healthcheck dupliziert den HEALTHCHECK aus backend/Dockerfile nicht (der greift
    # ohnehin), stellt aber sicher, dass "depends_on: condition: service_healthy" in anderen
    # Compose-Overlays (z.B. docker-compose.proxy.yml) darauf warten kann.
    # Bewusst die Liveness-Gruppe (nur Prozess-Status), NICHT das Root-/actuator/health: seit
    # AP6 (#32) ziehen betriebliche Health-Indicators das Root-Health bei getrenntem Terminal /
    # offenen abgelaufenen Executions auf 503 - das würde den Container sonst faelschlich als
    # "unhealthy" markieren und Neustarts/Wartezyklen ausloesen. Alerting laeuft ueber
    # /actuator/health bzw. /actuator/health/operational (siehe Runbook "Dauerbetrieb").
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health/liveness"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped

volumes:
  pgdata:
