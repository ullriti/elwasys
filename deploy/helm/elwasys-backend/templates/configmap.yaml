# Nicht-geheime Konfiguration (siehe deployment.yaml "envFrom" - Secrets für DB-/SMTP-
# Passwort und Pushover-Token liegen getrennt in templates/secret.yaml, siehe values.yaml
# "database:"/"smtp:"-Kommentare für die Begründung dieser Trennung).
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "elwasys-backend.fullname" . }}
  labels:
    {{- include "elwasys-backend.labels" . | nindent 4 }}
data:
  # Zeitzone (Issue #31) - muss mit der Terminal-Zeitzone übereinstimmen, siehe values.yaml.
  TZ: {{ .Values.timezone | quote }}
  ELWASYS_DB_URL: {{ include "elwasys-backend.jdbcUrl" . | quote }}
  ELWASYS_NOTIFICATIONS_ENABLED: {{ .Values.notifications.enabled | quote }}
  ELWASYS_SMTP_HOST: {{ .Values.smtp.host | quote }}
  ELWASYS_SMTP_PORT: {{ .Values.smtp.port | quote }}
  ELWASYS_SMTP_USER: {{ .Values.smtp.user | quote }}
  ELWASYS_SMTP_SENDER_ADDRESS: {{ .Values.smtp.senderAddress | quote }}
  ELWASYS_SMTP_AUTH: {{ .Values.smtp.auth | quote }}
  ELWASYS_SMTP_USE_SSL: {{ .Values.smtp.useSsl | quote }}
  ELWASYS_AUTH_REHASH_ON_LOGIN: {{ .Values.auth.rehashOnLogin | quote }}
  # Passwort-Reset (Issue #86/H7): die Portal-Basis-URL für die Reset-Mail-Links durchreichen.
  # Guard (analog secret.password): ist der Reset aktiv, MUSS passwordReset.baseUrl gesetzt sein -
  # "required" bricht "helm install/template" mit klarer Meldung ab, statt still den
  # Backend-Default http://localhost:8080 durchzulassen (tote localhost-Links in Produktions-
  # Reset-Mails). Ist der Reset deaktiviert, wird nur das Flag gesetzt und keine URL erzwungen.
  ELWASYS_PASSWORD_RESET_ENABLED: {{ .Values.passwordReset.enabled | quote }}
  {{- if .Values.passwordReset.enabled }}
  ELWASYS_PORTAL_BASE_URL: {{ required "passwordReset.baseUrl muss gesetzt sein (--set passwordReset.baseUrl=https://<portal-host>), wenn passwordReset.enabled=true - sonst verlinken die Reset-Mails auf http://localhost:8080. Siehe values.yaml." .Values.passwordReset.baseUrl | quote }}
  {{- end }}
