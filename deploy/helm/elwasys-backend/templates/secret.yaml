{{/*
Nur gerendert, wenn kein externes DB-Secret referenziert wird (siehe values.yaml
"database.existingSecret" - für Produktion wird ein extern verwaltetes Secret empfohlen,
z.B. über einen Secret-Manager/External-Secrets-Operator statt Klartext-Passwörter in
"helm install --set"/values-Dateien). Bündelt DB-, SMTP- und Pushover-Zugangsdaten in einem
Secret (alle drei sind "geheime" Werte, siehe values.yaml-Kommentare bei smtp.password/
pushover.apiToken).
*/}}
{{- if not .Values.database.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "elwasys-backend.dbSecretName" . }}
  labels:
    {{- include "elwasys-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.database.usernameKey }}: {{ .Values.secret.username | quote }}
  {{- /*
    Guard (Issue #64): erzeugt der Chart das Secret selbst (kein database.existingSecret), MUSS
    ein DB-Passwort gesetzt sein - sonst rendert hier ein leeres Passwort und das Backend würde
    mit leerem Passwort gegen die DB starten (oder scheitern). "required" bricht "helm
    install/template" mit klarer Meldung ab, statt still ein leeres Secret zu erzeugen. Für
    Produktion stattdessen ein extern verwaltetes database.existingSecret referenzieren.
  */}}
  {{ .Values.database.passwordKey }}: {{ required "secret.password muss gesetzt sein (--set secret.password=...), wenn kein database.existingSecret referenziert wird - sonst entstünde ein leeres DB-Passwort. Siehe values.yaml." .Values.secret.password | quote }}
  smtp-password: {{ .Values.smtp.password | quote }}
  pushover-api-token: {{ .Values.pushover.apiToken | quote }}
{{- end -}}
