# Profil fürs einmalige CLI-Erzeugen/Widerrufen von Standort-Tokens (siehe
# TerminalTokenCliRunner). web-application-type=none verhindert, dass der eingebettete
# Webserver hochfährt - der Prozess führt nur den ApplicationRunner aus und beendet sich
# danach von selbst.
#
# Vaadins Autokonfiguration (seit Phase 3 auf dem Klassenpfad) verlangt einen
# WebApplicationContext und bricht in diesem Nicht-Web-Kontext sonst mit
# "SpringBootAutoConfiguration required a bean of type WebApplicationContext" ab
# (Regression, die erst mit der token-cli-Nutzung im Phase-4-Testharness sichtbar wurde).
# Im reinen CLI-Lauf wird keine UI benötigt - Vaadin daher hier gezielt ausschließen.
spring:
  main:
    web-application-type: none
  autoconfigure:
    exclude:
      - com.vaadin.flow.spring.SpringBootAutoConfiguration
      - com.vaadin.flow.spring.SpringSecurityAutoConfiguration
