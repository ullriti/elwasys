spring:
  application:
    name: elwasys-backend

  # Datenbank: dieselbe PostgreSQL-DB wie Client-Raspi/Portal (Parallelbetrieb, siehe
  # kb/05-migration-plan.md). Alle drei Werte sind per Umgebungsvariable überschreibbar;
  # die Defaults passen zur lokalen Entwicklungsumgebung (siehe kb/04-build-and-run.md).
  datasource:
    url: ${ELWASYS_DB_URL:jdbc:postgresql://localhost:5432/elwasys}
    username: ${ELWASYS_DB_USER:elwaportal}
    password: ${ELWASYS_DB_PASSWORD:elwaportal}

  # JPA/Hibernate (AP2): das Schema kommt AUSSCHLIESSLICH von Flyway (siehe unten) - Hibernate
  # darf es weder generieren noch verändern. ddl-auto=none ist zwar bereits Spring Boots
  # Default für eine "echte" (nicht-eingebettete) Datenbank wie PostgreSQL, wird hier aber
  # trotzdem explizit gesetzt (siehe kb/05-migration-plan.md, Rahmenbedingungen: "Hibernate
  # ddl-auto bleibt aus/none"). open-in-view=false, weil dieses Arbeitspaket keine Web-Schicht
  # einführt, die davon profitieren würde (die REST-API folgt erst in AP4) - vermeidet
  # außerdem Spring Boots Startup-Warnung.
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  mvc:
    # RFC-7807-ProblemDetail-Antworten auch für Spring-MVC-Standardfehler (z.B.
    # @Valid-Validierungsfehler, fehlende Pflichtparameter) - ergänzt
    # ApiExceptionHandler, der die fachlichen Terminal-API-Fehler abdeckt (AP4, siehe
    # kb/05-migration-plan.md).
    problemdetails:
      enabled: true

  flyway:
    # baselineOnMigrate: eine bereits über den Alt-Weg (database-init.sql +
    # database-upgrade/*.sql) angelegte Bestands-DB hat keine flyway_schema_history-Tabelle,
    # aber bereits alle Tabellen. Flyway markiert sie dann als "auf baselineVersion migriert",
    # ohne V1 (== der Alt-Weg-Endstand 0.4.0) erneut auszuführen. Eine leere/frische DB
    # durchläuft V1 stattdessen ganz normal. Siehe kb/02-data-model.md.
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "Bestandsschema 0.4.0 (Alt-Weg: database-init.sql + database-upgrade/*.sql)"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Auth (AP3, siehe kb/05-migration-plan.md).
elwasys:
  auth:
    # SHA1->Argon2id-Migration beim Login: siehe AuthProperties-Javadoc/kb/05-migration-plan.md
    # ("Entscheidungen") für die vollständige Begründung. Default AUS, solange das Alt-Portal
    # noch läuft und SHA1 direkt in dieselbe Spalte schreibt/liest (Parallelbetrieb) - wird
    # erst beim Portal-Cutover (Phase 3) aktiviert.
    rehash-on-login: ${ELWASYS_AUTH_REHASH_ON_LOGIN:false}

logging:
  level:
    root: INFO
    org.kabieror.elwasys: INFO
    org.flywaydb: INFO

# API-Dokumentation (AP4, siehe kb/05-migration-plan.md): beschränkt springdoc auf die
# Terminal-API unter /api/v1/** (kein Katalog interner/künftiger Vaadin-Endpunkte). Erreichbar
# unter /v3/api-docs (JSON) bzw. /swagger-ui.html - beides läuft über die catch-all
# SecurityFilterChain aus SecurityConfig (AP3, alles außer /actuator/health erfordert eine
# Anmeldung), NICHT über die zustandslose Terminal-Token-Kette (die ist auf /api/v1/**
# begrenzt, siehe TerminalApiSecurityConfig) - die Dokumentation selbst liegt bewusst nicht
# unter /api/v1/**.
springdoc:
  packages-to-scan: org.kabieror.elwasys.backend.api
  paths-to-match: /api/v1/**
