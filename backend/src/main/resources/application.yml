spring:
  application:
    name: elwasys-backend

  # Datenbank: dieselbe PostgreSQL-DB wie die Client-Raspi-Terminals (die Terminals
  # greifen seit Phase 4 nur noch über die REST-API/WS-Kanal des Backends zu, nicht mehr
  # direkt auf die DB - siehe docs/kb/05-migration-plan.md). Alle drei Werte sind per
  # Umgebungsvariable überschreibbar; die Defaults passen zur lokalen Entwicklungsumgebung
  # (siehe docs/kb/04-build-and-run.md). "elwaportal" bleibt der produktive DB-User des Backends.
  datasource:
    url: ${ELWASYS_DB_URL:jdbc:postgresql://localhost:5432/elwasys}
    username: ${ELWASYS_DB_USER:elwaportal}
    password: ${ELWASYS_DB_PASSWORD:elwaportal}

  # JPA/Hibernate (AP2): das Schema kommt AUSSCHLIESSLICH von Flyway (siehe unten) - Hibernate
  # darf es weder generieren noch verändern. ddl-auto=none ist zwar bereits Spring Boots
  # Default für eine "echte" (nicht-eingebettete) Datenbank wie PostgreSQL, wird hier aber
  # trotzdem explizit gesetzt (siehe docs/kb/05-migration-plan.md, Rahmenbedingungen: "Hibernate
  # ddl-auto bleibt aus/none"). open-in-view=false, weil dieses Arbeitspaket keine Web-Schicht
  # einführt, die davon profitieren würde (die REST-API folgt erst in AP4) - vermeidet
  # außerdem Spring Boots Startup-Warnung.
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  mvc:
    # RFC-7807-ProblemDetail-Antworten auch für Spring-MVC-Standardfehler (z.B.
    # @Valid-Validierungsfehler, fehlende Pflichtparameter) - ergänzt
    # ApiExceptionHandler, der die fachlichen Terminal-API-Fehler abdeckt (AP4, siehe
    # docs/kb/05-migration-plan.md).
    problemdetails:
      enabled: true

  flyway:
    # baselineOnMigrate: eine bereits über den Alt-Weg (database-init.sql +
    # database-upgrade/*.sql) angelegte Bestands-DB hat keine flyway_schema_history-Tabelle,
    # aber bereits alle Tabellen. Flyway markiert sie dann als "auf baselineVersion migriert",
    # ohne V1 (== der Alt-Weg-Endstand 0.4.0) erneut auszuführen. Eine leere/frische DB
    # durchläuft V1 stattdessen ganz normal. Siehe docs/kb/02-data-model.md.
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "Bestandsschema 0.4.0 (entspricht der Flyway-V1-Baseline)"

  # Mail-Transport für den Benachrichtigungsdienst (AP5, siehe docs/kb/05-migration-plan.md und
  # elwasys.notifications unten). Aktiviert die JavaMailSender-Autokonfiguration von Spring
  # Boot (spring.mail.host muss als Property vorhanden sein, sonst wird kein JavaMailSender-
  # Bean erzeugt - leerer String genügt dafür, siehe NotificationsProperties-Javadoc). Bildet
  # dieselben Stellschrauben wie der Alt-Code (Common.ConfigurationManager) ab:
  # smtp.server->host, smtp.port->port, smtp.user->username, smtp.password->password,
  # smtp.useSSL->mail.smtp.ssl.enable (SSLOnConnect wie SimpleEmail#setSSLOnConnect im
  # Alt-Code, kein STARTTLS - der Alt-Code kennt nur diese eine Variante).
  mail:
    host: ${ELWASYS_SMTP_HOST:}
    port: ${ELWASYS_SMTP_PORT:465}
    username: ${ELWASYS_SMTP_USER:}
    password: ${ELWASYS_SMTP_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: ${ELWASYS_SMTP_AUTH:true}
      mail.smtp.ssl.enable: ${ELWASYS_SMTP_USE_SSL:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  health:
    # Der Actuator registriert automatisch einen Mail-Health-Indikator, sobald
    # spring-boot-starter-mail auf dem Klassenpfad liegt (AP5) - der würde per SMTP-NOOP
    # gegen spring.mail.host verbinden und den Health-Endpoint auf DOWN ziehen, solange kein
    # echter SMTP-Server konfiguriert ist (Default: leerer Host, siehe oben). Da der
    # Benachrichtigungsdienst per Default deaktiviert ist (elwasys.notifications.enabled:
    # false) und noch von keinem produktiven Ablauf abhängt, wäre ein SMTP-Ausfall hier kein
    # aussagekräftiges "Backend ist nicht betriebsbereit" - deaktiviert.
    mail:
      enabled: false

# Auth (AP3, siehe docs/kb/05-migration-plan.md).
elwasys:
  auth:
    # SHA1->Argon2id-Migration beim Login: siehe AuthProperties-Javadoc/kb/05-migration-plan.md
    # ("Entscheidungen") für die vollständige Begründung. Der ursprüngliche Grund für den
    # Default AUS (Parallelbetrieb mit dem Alt-Portal, das SHA1 direkt in dieselbe Spalte
    # schreibt/liest) ist mit dem Portal-Cutover (Phase 3) und der Entfernung des Alt-Portal-
    # Moduls (Phase 5 AP1) entfallen. Ob/wann das Flag produktiv aktiviert wird, ist eine
    # Entscheidung der eigentlichen Produktivumschaltung (Phase 6) und bewusst nicht Teil
    # dieses Arbeitspakets - der Code-Default bleibt daher unverändert AUS.
    rehash-on-login: ${ELWASYS_AUTH_REHASH_ON_LOGIN:false}

  # Benachrichtigungsdienst (AP5, siehe docs/kb/05-migration-plan.md und NotificationsProperties-
  # Javadoc). Der Dienst ist seit Phase 4 AP4 an die Terminal-API angebunden (Client-Raspi
  # verschickt seit dem Cutover keine eigenen Benachrichtigungen mehr, siehe ExecutionController).
  # enabled bleibt dennoch bewusst AUS: die Scharfschaltung ist ein operativer Schritt der
  # eigentlichen Produktivumschaltung (Phase 6), kein Teil dieses Arbeitspakets - der Code-
  # Default bleibt daher unverändert AUS.
  notifications:
    enabled: ${ELWASYS_NOTIFICATIONS_ENABLED:false}
    smtp:
      sender-address: ${ELWASYS_SMTP_SENDER_ADDRESS:}
    pushover:
      api-token: ${ELWASYS_PUSHOVER_API_TOKEN:}

  # Passwort-Reset per Email (Phase 3 AP4, siehe docs/kb/05-migration-plan.md und
  # PasswordResetProperties-Javadoc). Anders als "notifications" oben DEFAULT AN: kein
  # Doppelversand-Risiko, weil dieser Mailversand nur durch eine explizite interaktive
  # Portal-Aktion ausgelöst wird (siehe PasswordResetProperties-Javadoc für die vollständige
  # Begründung). Nutzt denselben spring.mail.*-Transport wie "notifications" oben.
  password-reset:
    enabled: ${ELWASYS_PASSWORD_RESET_ENABLED:true}
    token-validity: ${ELWASYS_PASSWORD_RESET_TOKEN_VALIDITY:PT2H}
    portal-base-url: ${ELWASYS_PORTAL_BASE_URL:http://localhost:8080}

  # Offline-Robustheit (Phase 4 AP6, siehe docs/kb/05-migration-plan.md "Konzeptskizze:
  # Offline-Buchungen am Terminal" und ClientTimestampPolicy-Javadoc). Die eigentliche
  # "offline.max-duration" ist KEIN globaler Schalter, sondern pro Standort im
  # Standorte-Dialog konfigurierbar (locations.offline_max_duration_minutes, Default 60,
  # siehe LocationEntity) - hier nur die globale Uhren-Drift-Toleranz.
  offline:
    clock-drift-tolerance: ${ELWASYS_OFFLINE_CLOCK_DRIFT_TOLERANCE:PT5M}

logging:
  level:
    root: INFO
    org.kabieror.elwasys: INFO
    org.flywaydb: INFO

# API-Dokumentation (AP4, siehe docs/kb/05-migration-plan.md): beschränkt springdoc auf die
# Terminal-API unter /api/v1/** (kein Katalog interner/künftiger Vaadin-Endpunkte). Erreichbar
# unter /v3/api-docs (JSON) bzw. /swagger-ui.html - beides läuft über die catch-all
# SecurityFilterChain aus SecurityConfig (AP3, alles außer /actuator/health erfordert eine
# Anmeldung), NICHT über die zustandslose Terminal-Token-Kette (die ist auf /api/v1/**
# begrenzt, siehe TerminalApiSecurityConfig) - die Dokumentation selbst liegt bewusst nicht
# unter /api/v1/**.
springdoc:
  packages-to-scan: org.kabieror.elwasys.backend.api
  paths-to-match: /api/v1/**
